name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE] - "
labels: ["enhancement", "feature"]
assignees:
  - mikhail5545
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please fill in the details below to help us understand your request and how it would benefit the project.
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of what the feature is and how it would work.
    validations:
      required: true
  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: A clear and concise description of the benefits of this feature and how it would improve the project.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: A clear and concise description of any alternative solutions or features you have considered.