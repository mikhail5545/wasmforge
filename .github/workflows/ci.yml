name: ci.yml
on:
  push:
    branches: ["master"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: ["master"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

jobs:
  build-and-test:
    name: Build UI and Run Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: ui/adminv2/package-lock.json
      
      - name: Install UI Dependencies
        working-directory: ui/adminv2
        run: npm ci

      - name: Build UI
        working-directory: ui/adminv2/apps/web
        run: npx next build

      - name: Prepare Embed
        run: |
          mkdir -p pkg/ui/out
          cp -r ui/adminv2/apps/web/out/* pkg/ui/out/
          ls -R pkg/ui/out

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run Unit tests, filter and collect coverage
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.tmp ./...
          grep -v 'internal/mock' coverage.tmp > coverage.out || true
          rm coverage.tmp

      - name: Print coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage.out
          retention-days: 10

